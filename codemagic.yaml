workflows:
  ios-build:
    name: iOS Flutter Build
    instance_type: mac_mini_m1
    max_build_duration: 60
    integrations:
      app_store_connect: Apple Portal
    environment:
      groups:
        - app_store_credentials
      flutter: stable
      xcode: latest


    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
    scripts:
      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "com.emreduman.namazvakitleri" --type IOS_APP_STORE --create
          keychain add-certificates
          xcode-project use-profiles --project namaz_app/ios/Runner.xcodeproj

      - name: Build Flutter iOS app
        script: |
          cd namaz_app
          flutter pub get
          flutter build ipa --release --export-options-plist=$HOME/export_options.plist
    artifacts:
      - namaz_app/build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true


